<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festiflow — Événements</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ FESTIFLOW DESIGN SYSTEM — exact token parity ═══
   Accent palette (3 semantic + 2 brand = 5 total):
   green #34d399 · red #f87171 · amber #fbbf24
   purple #a855f7 (day-0) · indigo #6366f1 (day-1)
   NO other hue is introduced anywhere.
   ══════════════════════════════════════════════════ */
:root {
  --bg:#08080d; --surface:#101017; --surface-2:#16161f;
  --border:rgba(255,255,255,0.05); --border-h:rgba(255,255,255,0.08);
  --text:#f0f0f5; --text-muted:#a0a0b0; --text-dim:#5a5a6a;
  --green:#34d399; --red:#f87171; --amber:#fbbf24;
  --purple:#a855f7; --indigo:#6366f1;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-padding-top:56px}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:19px;line-height:1.55;overflow-x:hidden}
.wrap{max-width:1020px;margin:0 auto;padding:12px 20px 80px;overflow-x:hidden}

/* ── NAV ─────────────────────────────── */
.nav{position:-webkit-sticky;position:sticky;top:0;z-index:100;background:var(--surface);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);padding:0;margin-bottom:0}
.nav-top{max-width:1020px;margin:0 auto;display:flex;align-items:center;padding:0 20px}
.nav-sw{display:flex;align-items:center;gap:8px;padding:8px 14px 8px 0;margin-right:8px;border-right:1px solid rgba(255,255,255,.05);flex-shrink:0;cursor:pointer;transition:opacity .15s}
.nav-sw:hover{opacity:.8}
.nav-sw-av{width:36px;height:36px;border-radius:50%;background:var(--surface-2);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;overflow:hidden}
.nm{font-size:12px;font-weight:500;padding:8px 12px;color:var(--text-dim);cursor:pointer;white-space:nowrap;transition:color .15s;border:none;background:none;font-family:inherit}
.nm:hover{color:var(--text-muted)}
.nm.on{color:#fff;font-weight:600}
.nm.on svg{opacity:1}
.nm.pl{color:#333;cursor:default;font-style:normal}
.nm.pl:hover{color:#333}
.dt.on{background:rgba(255,255,255,.06);color:#fff;font-weight:600}
.dept-tabs-bg{background:rgba(0,0,0,.15);border-top:1px solid rgba(255,255,255,.03)}
.dept-tabs{max-width:1020px;margin:0 auto;padding:2px 20px;display:flex;overflow-x:auto;scrollbar-width:none}
.dept-tabs::-webkit-scrollbar{display:none}
.dt{padding:8px 12px;font-size:12px;font-weight:500;color:var(--text-dim);white-space:nowrap;border:none;border-bottom:2px solid transparent;background:none;font-family:inherit;cursor:pointer;transition:color .15s}
.dt:hover{color:var(--text-muted)}
.dt.on{color:#fff;font-weight:600}

/* ── DASHBOARD SURFACE ─────────────────── */
/* Filter toggle chrome uses chip-ds palette (indigo .15/.4 + #818cf8) for active state.
 * chip-family CSS retained from BudgetFlow port for filter chrome only — event-status
 * indication retired chip-family in favor of dot+label pattern (precedent: session
 * switcher .nav-sw lines 86-89). Same chrome vocabulary, different surface job. */
.bilan-toggle-btn.active{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#818cf8}
.bilan-toggle-btn:hover:not(.active){background:rgba(255,255,255,.04)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;cursor:pointer;transition:border-color .3s,box-shadow .3s}
.card:hover{border-color:rgba(255,255,255,.12)}
#dash-grid{display:flex;flex-direction:column;gap:20px}
#nouvelle-date-btn:hover{background:rgba(255,255,255,.04);color:var(--text)}

/* ── DRAWER ──────────────────────────────────────────
 * Ported verbatim from standalones/budget/budget_pa.html L298-330.
 * Chrome stays canonical; only content-context (event-detail) differs.
 * ───────────────────────────────────────────────────── */
#drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.15);z-index:400;opacity:0;pointer-events:none;transition:opacity .25s}
#drawer-overlay.open{opacity:1;pointer-events:auto}

#drawer{position:fixed;top:0;right:0;bottom:0;width:min(420px,100vw);background:var(--surface);border-left:1px solid var(--border);z-index:401;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
#drawer.open{transform:translateX(0)}

.drawer-hdr{padding:20px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.drawer-title{font-family:'Space Grotesk',sans-serif;font-size:.95em;font-weight:700;color:#fff;line-height:1.3}
.drawer-sub{font-size:.7em;color:var(--text-muted);margin-top:3px}
.drawer-close{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);cursor:pointer;padding:4px 10px;font-size:.75em;flex-shrink:0;transition:all .2s}
.drawer-close:hover{border-color:var(--text-muted);color:#fff}

.drawer-body{flex:1;overflow-y:auto;padding:20px}
.drawer-body::-webkit-scrollbar{width:4px}
.drawer-body::-webkit-scrollbar-track{background:transparent}
.drawer-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.drawer-section{margin-bottom:20px}
.drawer-section-title{font-size:.6em;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.drawer-kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.drawer-kpi{background:var(--surface-2);border-radius:8px;padding:12px 14px}
.drawer-kpi-label{font-size:.6em;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);font-weight:600;margin-bottom:4px}
.drawer-kpi-val{font-size:.92em;font-weight:700;color:#fff}

.drawer-empty{text-align:center;padding:32px 16px;color:var(--text-dim);font-size:.8em}
.drawer-empty-icon{font-size:2em;margin-bottom:10px}

.drawer-footer{padding:16px 20px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px}
.drawer-btn{flex:1;padding:9px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.72em;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;border:1px solid var(--border);background:var(--surface-2);color:var(--text-muted)}
.drawer-btn:hover{border-color:var(--text-muted);color:#fff}
.drawer-btn.primary{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:#fff;font-weight:600}
.drawer-btn.primary:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff}

@media(max-width:720px){
  html,body{overflow-x:hidden}
  body{font-size:15px}
  .wrap{padding:0 12px 60px}
  /* drawer becomes bottom sheet — ported from budget_pa.html L243-244 + L417-422.
   * L243 #drawer:90vh is redundant with L417 height:82vh override — port as parity
   * deviation per port-time discipline (no unilateral prune). Class 1 observation. */
  #drawer{height:90vh}
  #drawer{top:auto;left:0;right:0;bottom:0;width:100%;height:82vh;border-left:none;border-top:1px solid var(--border);border-radius:18px 18px 0 0;transform:translateY(100%)}
  #drawer.open{transform:translateY(0)}
  .drawer-hdr{padding-top:24px}
  .drawer-hdr::before{content:'';display:block;width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 12px;position:absolute;top:10px;left:50%;transform:translateX(-50%)}
  .drawer-kpi-row{grid-template-columns:1fr!important;gap:8px}
}

@media(max-width:480px){
  body{font-size:15px}
  .nav{position:-webkit-sticky;position:sticky;top:0;z-index:100;background:var(--surface)}
  .nav-sw{padding:6px 10px 6px 0;margin-right:4px}
  .nav-sw-av{width:30px;height:30px}
  .nm{font-size:12px;padding:8px 10px}
  .nav-top{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;mask-image:linear-gradient(to right,#000 85%,transparent);-webkit-mask-image:linear-gradient(to right,#000 85%,transparent)}
  .nav-top::-webkit-scrollbar{display:none}
  .dt{font-size:13px;padding:10px 14px}
  .dept-tabs{mask-image:linear-gradient(to right,#000 85%,transparent);-webkit-mask-image:linear-gradient(to right,#000 85%,transparent)}
}
</style>
</head>

<main class="wrap">

  { name:'Test calcul tournée hiver',       status:'PREP',     is_sandbox:true,  is_general:false,
    city:null, venue:null, start_date:null, number_of_days:null, poster_url:null, display_initials:'TC',
    budget_target:null, budget_consumed:null, edition_number:null, capacity:null,
    dice_backend_url:null, shotgun_backend_url:null,
    dice_public_buy_url:null, shotgun_public_buy_url:null,
    budgetflow_url:null, billetterie_url:null },
];

/* window.MD consumer wrapper — thin async indirection over STAGE2_EVENTS.
 * Exercises the architectural shape Stage 3 handoff L387 spec'd for V2 backend
 * wire-in (Postgres-backed events table read via Node API). V1 stays sync-array
 * underneath; the async signature matters for the contract, not the timing.
 * Stage 6 absorption replaces inline STAGE2_EVENTS with import from mock-data.js
 * keeping window.MD.getEvents shape unchanged. */
window.MD = window.MD || {};
window.MD.getEvents = async function() {
  return STAGE2_EVENTS;
};

/* Status indicator = dot + label (chip-family retires from event-status indication;
 * stays in design system for other uses).
 * Precedent: session switcher dot+label at top-left of nav (small green dot + text).
 * Same grammar applied to event cards. Cross-surface coherence by construction.
 *   LAUNCHED + LIVE         → "En vente"        green dot
 *   PREP + VALIDÉ           → "En préparation"  indigo dot
 *   is_sandbox=true (any)   → "Sandbox"         dim dot
 *   CLOSED                  → never on Dashboard (Phase 5 Anciens)
 */
function statusFor(evt) {
  if (evt.is_sandbox)                                       return { label:'Sandbox',        color:'var(--text-dim)' };
  if (evt.status === 'LAUNCHED' || evt.status === 'LIVE')   return { label:'En vente',       color:'var(--green)' };
  if (evt.status === 'PREP'     || evt.status === 'VALIDÉ') return { label:'En préparation', color:'#818cf8' };
  return null;
}

/* Today anchor for J-N computation. V1: hard-coded for deterministic preview rendering
 * (matches Leo's Stage 3 framing — today = 16 mai 2026). V2: replace with
 * `new Date().toISOString().slice(0,10)` when production-deployed.
 */
const TODAY = '2026-05-16';

/* Time indicator — second row of status zone (below dot+label, right-aligned).
 *   LIVE                              → "EN COURS"
 *   any other status + start_date set → "J-N" / "J-0" / "J+N"
 *   any status + start_date null      → "—" (field-level fallback)
 * Note: only LAUNCHED is currently in the working set alongside VALIDÉ; PREP and
 * LIVE branches dormant for visible render. Sandbox events join at Stage 5
 * filter-wiring (sandbox with null start_date renders "—" per field-level rule).
 */
function timeIndicatorFor(evt) {
  if (evt.status === 'LIVE') return 'EN COURS';
  if (!evt.start_date)       return '—';
  const today = new Date(TODAY + 'T00:00:00Z');
  const start = new Date(evt.start_date + 'T00:00:00Z');
  const days = Math.round((start - today) / 86400000);
  if (days > 0)  return `J-${days}`;
  if (days === 0) return 'J-0';
  return `J+${Math.abs(days)}`;
}

/* Euro formatter — fr-FR locale produces non-breaking-space thousands separator
 * and trailing " €" symbol (e.g., 950000 → "950 000 €"). Zero decimal places at
 * Dashboard glance scale; full precision lives in fiche later.
 * Field-level "—" fallback when amount is null/undefined (applies to any pill).
 */
function formatEuro(amount) {
  if (amount == null) return '—';
  return new Intl.NumberFormat('fr-FR', { style:'currency', currency:'EUR', maximumFractionDigits:0 }).format(amount);
}

/* Identity row 2 formatters — Édition / Plateforme / Capacité.
 *   formatEdition: "1ère édition" for null/1, "Édition N" for N≥2.
 *   platformFor:   derived from dice_backend_url + shotgun_backend_url presence.
 *                  Neither populated → "—" (defining trait of En préparation pill).
 *   formatCapacity: fr-FR thousands-sep, no suffix. Field-level "—" fallback.
 *                   V1 reads event.capacity (event-level total); V2 Postgres SCHEMA
 *                   computes SUM across event_days. See STAGE2_EVENTS comment.
 */
function formatEdition(n) {
  if (n == null || n <= 1) return '1ère édition';
  return `Édition ${n}`;
}

function platformFor(evt) {
  const d = !!evt.dice_backend_url;
  const s = !!evt.shotgun_backend_url;
  if (d && s) return 'Dice + Shotgun';
  if (d)      return 'Dice';
  if (s)      return 'Shotgun';
  return '—';
}

function formatCapacity(n) {
  if (n == null) return '—';
  return new Intl.NumberFormat('fr-FR').format(n);
}

/* Date format — full version pulled forward from Stage 5.
 * Single-day:        "31 octobre 2026"
 * Same-month:        "11-13 juin 2026"
 * Cross-month/year:  "30 juin - 2 juillet 2026" / "28 déc 2026 - 3 jan 2027"
 * Null start_date:   "" (caller decides what to render in its place)
 */
const MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function formatEventDate(startDate, numberOfDays) {
  if (!startDate) return '';
  const [y, m, d] = startDate.split('-').map(Number);
  const days = numberOfDays || 1;
  if (days === 1) return `${d} ${MOIS[m-1]} ${y}`;
  const end = new Date(Date.UTC(y, m-1, d + days - 1));
  const eY = end.getUTCFullYear(), eM = end.getUTCMonth()+1, eD = end.getUTCDate();
  if (y === eY && m === eM) return `${d}-${eD} ${MOIS[m-1]} ${y}`;
  if (y === eY)             return `${d} ${MOIS[m-1]} - ${eD} ${MOIS[eM-1]} ${y}`;
  return `${d} ${MOIS[m-1]} ${y} - ${eD} ${MOIS[eM-1]} ${eY}`;
}

/* City · venue single-line join. Null-safe (city alone when venue null).
 * Reserved for Stage 4 drawer header city·venue single-line treatment.
 * Unused at Stage 2 — cards use separate Ville/Lieu rows. */
function formatLocation(city, venue) {
  if (!city && !venue) return '';
  if (!venue) return city;
  if (!city)  return venue;
  return `${city} · ${venue}`;
}

/* Poster placeholder palette — index-cycled per event for variety. */
const POSTER_PALETTE = [
  'rgba(99,102,241,.85)',    // indigo
  'rgba(168,85,247,.85)',    // purple
  'rgba(52,211,153,.85)',    // green
];

function getPosterBg(idx) {
  return POSTER_PALETTE[idx % POSTER_PALETTE.length];
}

/* Initials read from `display_initials` data field on each event (added at Stage 2 close).
 * Heuristic-based extraction (former getInitials) retired — explicit field is more
 * robust, removes Stage 6 cleanup debt, forward-keeps when mock-data.js absorbs the field.
 */

function posterZoneHTML(evt, idx) {
  if (evt.poster_url) {
    return `<div style="flex:0 0 110px;overflow:hidden;background:var(--surface-2)">
        <img src="${evt.poster_url}" alt="${evt.name}" style="width:100%;height:100%;object-fit:cover;display:block">
      </div>`;
  }
  return `<div style="flex:0 0 110px;background:${getPosterBg(idx)};display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2em;font-weight:800;letter-spacing:-1px">${evt.display_initials}</div>`;
}

/* KPI tile chrome — ported from budget_general.html lines 272-275 (.bchip family) with
 * two Class 1 contextual deviations for in-card composition:
 *   1. background:var(--surface) → var(--surface-2). Source bchips sit on body bg
 *      (var(--bg)); in-card bchips sit on card bg (var(--surface)) and need surface-2
 *      lift to read as distinct tiles.
 *   2. bchip-val font-size:1.35em → .95em. Source bchips are page-level chips meant to
 *      dominate; in-card bchips must subordinate to event name (1.05em) to preserve
 *      hierarchy. Stage 3 KPI fill applies the smaller tier without re-balancing.
 * Inline-styled per established convention (no class invented mid-iteration).
 * `flex:1 1 200px;min-width:0` added inline for arrangement only.
 * Stage 3 fill: tiles populated with Budget / Consommé / Restant — uniform across
 * all pills per Leo Stage 3 sign-off. Field-level "—" fallback applies tile-by-tile
 * when budget_target or budget_consumed is null/0, independent of event pill row.
 */
const BCHIP_STYLE       = 'background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;transition:border-color .2s;flex:1 1 0;min-width:0';
const BCHIP_LABEL_STYLE = 'font-size:.6em;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-dim);font-weight:600;margin-bottom:6px';
const BCHIP_VAL_STYLE   = 'font-size:.95em;font-weight:700;color:#fff;letter-spacing:-.3px;line-height:1.1';
const BCHIP_SUB_STYLE   = 'font-size:.65em;color:var(--text-muted);margin-top:4px';

/* Identity row helper — single label/value pair, used by identityRow1HTML +
 * identityRow2HTML to keep typography parallel by construction across rows.
 * Inline-styled per established convention; class promotion deferred to Stage 6.
 */
function identityRowHTML(label, value) {
  return `<div style="display:flex;align-items:baseline;gap:16px">
            <span style="font-size:.55em;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);font-weight:600">${label}</span>
            <span style="font-size:.78em;color:#fff;font-weight:500">${value}</span>
          </div>`;
}

function identityRow1HTML(evt) {
  const lieu = evt.venue || 'À confirmer';
  return `<div style="display:flex;flex-direction:column;gap:6px">
          ${identityRowHTML('Date',  formatEventDate(evt.start_date, evt.number_of_days))}
          ${identityRowHTML('Ville', evt.city || '—')}
          ${identityRowHTML('Lieu',  lieu)}
        </div>`;
}

function identityRow2HTML(evt) {
  return `<div style="display:flex;flex-direction:column;gap:6px">
          ${identityRowHTML('Édition',    formatEdition(evt.edition_number))}
          ${identityRowHTML('Plateforme', platformFor(evt))}
          ${identityRowHTML('Capacité',   formatCapacity(evt.capacity))}
        </div>`;
}

function kpiTileHTML(label, value) {
  return `<div style="${BCHIP_STYLE}">
            <div style="${BCHIP_LABEL_STYLE}">${label}</div>
            <div style="${BCHIP_VAL_STYLE}">${value}</div>
          </div>`;
}

function tilesEnvelopeHTML(evt) {
  const total     = evt.budget_target;
  const consumed  = evt.budget_consumed;
  const remaining = (total != null && consumed != null) ? total - consumed : null;
  return `<div style="display:flex;gap:10px">
          ${kpiTileHTML('Budget',    formatEuro(total))}
          ${kpiTileHTML('Consommé',  formatEuro(consumed))}
          ${kpiTileHTML('Restant',   formatEuro(remaining))}
        </div>`;
}

/* KPI row 2 — V2 Billetterie scaffolding. Sits in the right column of the
 * content-zone two-column split, anchored under identity column 2. Empty
 * bare-chrome tiles with &nbsp; placeholders on label + value lines to
 * preserve filled-tile dimensions (envelope reads as "reserved for V2", not
 * "stage-incomplete"). Extends Stage 2's reserve-envelope-for-next-stage
 * precedent from Stage 3 to V2.
 * Stage 6 retrospective: keep scaffolding at V1 ship, or strip at ship time?
 */
function emptyTileHTML() {
  return `<div style="${BCHIP_STYLE}">
            <div style="${BCHIP_LABEL_STYLE}">&nbsp;</div>
            <div style="${BCHIP_VAL_STYLE}">&nbsp;</div>
          </div>`;
}

function emptyTilesEnvelopeHTML() {
  return `<div style="display:flex;gap:10px">
          ${emptyTileHTML()}
          ${emptyTileHTML()}
          ${emptyTileHTML()}
        </div>`;
}

/* Header separator chrome — diverges from var(--border) (actual token value
 * rgba(255,255,255,0.05) — below visibility threshold at production scale on
 * iPad-class displays). Inline rgba(255,255,255,0.15) reads as visible-but-
 * subtle 1px line per Leo Stage 3 close pass. Token system stays hard-locked;
 * no new --border-strong token invented. PARKED for Stage 6:
 * design-token review — does --border at 0.05 want a sibling token at 0.12-
 * 0.15 alpha for visible-but-subtle dividers across the umbrella program?
 */
const HEADER_SEPARATOR_HTML = '<div style="height:1px;background:rgba(255,255,255,0.15)"></div>';

function cardHTML(evt, idx) {
  const s = statusFor(evt);
  const timeStr = timeIndicatorFor(evt);
  const statusHTML = s ? `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
            <div style="display:inline-flex;align-items:center;gap:8px">
              <div style="width:7px;height:7px;border-radius:50%;background:${s.color}"></div>
              <span style="font-size:.75em;font-weight:500;color:var(--text)">${s.label}</span>
            </div>
            <div style="font-size:.65em;color:var(--text-dim)">${timeStr}</div>
          </div>` : '';
  return `
    <div class="card" style="padding:0;overflow:hidden">
      <div style="display:flex;flex-direction:row">
        ${posterZoneHTML(evt, idx)}
        <div style="flex:1;padding:16px 24px;display:flex;flex-direction:column;gap:14px;min-width:0">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
            <div style="font-size:.85em;font-weight:700;color:#fff;letter-spacing:-.2px;min-width:0;word-break:break-word">${evt.name}</div>
            ${statusHTML}
          </div>
          ${HEADER_SEPARATOR_HTML}
          <div style="display:flex;flex-direction:row;gap:20px;min-width:0">
            <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:14px">
              ${identityRow1HTML(evt)}
              ${tilesEnvelopeHTML(evt)}
            </div>
            <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:14px">
              ${identityRow2HTML(evt)}
              ${emptyTilesEnvelopeHTML()}
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ─────────────────────────────────────────────────────────────────────────
 * Stage 4 drawer wire.
 *
 * drawerRowHTML — label-value row using budget_pa.html L749-752 space-between
 *   pattern. Distinct from identityRowHTML (card's clustered-left helper at
 *   L408): drawer is single-column wide where the card's clustered-left was
 *   tuned for half-column-with-separator. Stage 4 Q1 picks space-between to
 *   mirror fiche page convention (which the drawer is a stub-precursor of).
 *   Class 1 deviation logged for Stage 6 DESIGN_LOG.
 *
 * STATUS_OPTIONS — 5 internal SCHEMA values with user-facing pill-collapse
 *   labels + SCHEMA in parens per Stage 4 Q2. Geo admin sees the vocabulary
 *   collapse (En préparation / En vente / Passé) plus the SCHEMA value so
 *   it's clear what state the system tracks. CLOSED selectable per ADR-0008
 *   read-write scope; post-change the event simply won't appear on Dashboard.
 *
 * openEventDrawer / closeDrawer — closeDrawer ported from budget_pa.html
 *   L3432-3436 with the PA-specific _drawerCurrentLine = null line stripped
 *   (Module Dates has no equivalent state). Open mechanism mirrors the
 *   universal pattern from PA (last 2 lines of every openX function): set
 *   .open class on both #drawer-overlay and #drawer after innerHTML populated.
 *
 * handleStatusChange — V1 mock-data update only per spec. Updates in-memory
 *   STAGE2_EVENTS entry, re-renders Dashboard so the card pill reflects the
 *   new status, re-opens the drawer for the same event so context survives
 *   the re-render. Sort order is start_date-based, not status-based, so card
 *   doesn't move position.
 * ───────────────────────────────────────────────────────────────────────── */

function drawerRowHTML(label, value) {
  return `<div style="display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding:6px 0">
    <span style="font-size:.72em;color:var(--text-muted)">${label}</span>
    <span style="font-size:.78em;font-weight:600;color:#fff;text-align:right">${value}</span>
  </div>`;
}

/* ─────────────────────────────────────────────────────────────────────────
 * Raccourcis section — V1 drawer reframe (Leo call, Stage 4 preview-3 + 4).
 *
 * Drawer purpose expanded from "thin status-change surface" to "practical
 * cross-tool action hub." Class 2/3 architectural shift: extends ADR-0008
 * scope (drawer was read-write display + attach; now also cross-tool nav
 * hub). n=1 reproduction so far (Module Dates only) — file new ADR or
 * extend ADR-0008 at n=2 if other module drawers reproduce. Logged as
 * Class 3 candidate for Stage 6 ADR pre-flight pass.
 *
 * Four shortcut surfaces V1, all null-conditional per honest mock-data
 * spread (Sonora Bordeaux fully-configured, others sparse):
 *  - Dice (public + backend, row hidden if both URLs null)
 *  - Shotgun (public + backend, row hidden if both URLs null)
 *  - BudgetFlow (always rendered; "non créé" dimmed when URL null)
 *  - Billetterie (always rendered; "non configuré" dimmed when URL null)
 *
 * Chrome at preview-4 (Leo: "buttons ugly and bulky"): retired the .drawer-btn
 * pattern entirely. Shortcuts now render as typography-only text-link rows
 * with ↗ external-link indicator, matching umbrella vocabulary (top-nav .nm
 * buttons, identity rows, dot+label status indicator — chrome-free nav). The
 * boxed-button pattern was right for BudgetFlow's drawer-footer action buttons
 * (Fermer / Dissocier — discrete CTAs) but wrong for shortcut surfaces that
 * are functionally nav links. Different role, different chrome.
 *
 * Two features Leo briefed as V1-want but defer-V2-decided this turn:
 *  - Cross-tool notifications (DA + Billetterie sales drops) — PARKED V2.
 *    DA module doesn't exist V1 per briefs/demande-achat.md; Billetterie
 *    notifications aren't a feature anywhere. No V1 surface, no scaffold.
 *  - Billetterie KPIs (sold-out projection, tickets sold today) — PARKED V2.
 *    Brief evenements.md §51 explicit defer; exec prompt L97 reaffirmed.
 *
 * Stage 6 PARKED.md entries land at close.
 * ───────────────────────────────────────────────────────────────────────── */

function raccourciLinkHTML(label, url, disabledLabel) {
  if (!url) {
    return `<span style="font-size:.72em;font-weight:500;color:var(--text-dim);white-space:nowrap">${disabledLabel || label}</span>`;
  }
  return `<a href="${url}" target="_blank" rel="noopener"
    style="font-size:.72em;font-weight:500;color:var(--text-muted);text-decoration:none;white-space:nowrap;transition:color .15s"
    onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--text-muted)'">${label} <span style="font-size:.85em;opacity:.7">↗</span></a>`;
}

function platformRowHTML(name, publicUrl, backendUrl) {
  if (!publicUrl && !backendUrl) return '';
  const links = [];
  if (publicUrl) links.push(raccourciLinkHTML('Page publique', publicUrl));
  if (backendUrl) links.push(raccourciLinkHTML('Backend', backendUrl));
  return `<div style="display:flex;align-items:baseline;gap:14px;padding:7px 0">
    <span style="flex:0 0 70px;font-size:.7em;font-weight:600;color:#fff;letter-spacing:.2px">${name}</span>
    <div style="flex:1;display:flex;gap:18px;justify-content:flex-end;flex-wrap:wrap">${links.join('')}</div>
  </div>`;
}

function toolRowHTML(name, url, disabledLabel) {
  return `<div style="display:flex;align-items:baseline;justify-content:space-between;gap:14px;padding:7px 0">
    <span style="font-size:.72em;font-weight:600;color:#fff">${name}</span>
    ${raccourciLinkHTML('Ouvrir', url, disabledLabel)}
  </div>`;
}

function raccourcisHTML(evt) {
  const platforms = [
    platformRowHTML('Dice',    evt.dice_public_buy_url,    evt.dice_backend_url),
    platformRowHTML('Shotgun', evt.shotgun_public_buy_url, evt.shotgun_backend_url)
  ].filter(Boolean).join('');

  return `
    <div class="drawer-section">
      <div class="drawer-section-title">Raccourcis</div>
      ${toolRowHTML('BudgetFlow',  evt.budgetflow_url,  'non créé')}
      ${toolRowHTML('Billetterie', evt.billetterie_url, 'non configuré')}
      ${platforms ? '<div style="height:1px;background:var(--border);margin:10px 0"></div>' + platforms : ''}
    </div>
  `;
}

const STATUS_OPTIONS = [
  { schema: 'PREP',     label: 'En préparation (PREP)' },
  { schema: 'VALIDÉ',   label: 'Validé (VALIDÉ)' },
  { schema: 'LAUNCHED', label: 'En vente — billetterie ouverte (LAUNCHED)' },
  { schema: 'LIVE',     label: 'En vente — pendant l\u2019événement (LIVE)' },
  { schema: 'CLOSED',   label: 'Passé (CLOSED)' }
];

function statusOptionsHTML(currentStatus) {
  return STATUS_OPTIONS
    .map(o => `<option value="${o.schema}"${o.schema === currentStatus ? ' selected' : ''}>${o.label}</option>`)
    .join('');
}

function openEventDrawer(evt) {
  // Header
  document.getElementById('drawer-title').textContent = evt.name;
  const locStr = formatLocation(evt.city, evt.venue);
  const dateStr = formatEventDate(evt.start_date, evt.number_of_days);
  const subParts = [locStr, dateStr].filter(s => s && s !== '—');
  document.getElementById('drawer-sub').textContent = subParts.length ? subParts.join(' · ') : '—';

  // Right-aligned status indicator above Fermer button (Stage 4 preview-2 fix —
  // dot+label was merging with sub-line text at .drawer-sub flow; right-edge
  // placement separates status visually from event metadata).
  const s = statusFor(evt);
  document.getElementById('drawer-status-indicator').innerHTML = s
    ? `<div style="width:7px;height:7px;border-radius:50%;background:${s.color}"></div>
       <span style="font-size:.7em;font-weight:500;color:var(--text);white-space:nowrap">${s.label}</span>`
    : '';

  // Body — 3 sections (Détails / Raccourcis / Statut). Détails top per Leo
  // preview-4: confirmation context anchors first, then nav-out actions,
  // then in-place state mutation. Reads as "this is the event → here's
  // where you can go from it → here's how you change it." Budget KPI
  // section dropped at preview-2 — redundant with card row 1.
  // Notifications + Billetterie KPIs PARKED V2 — see raccourcisHTML block.
  document.getElementById('drawer-body').innerHTML = `
    <div class="drawer-section">
      <div class="drawer-section-title">Détails</div>
      ${drawerRowHTML('Date',       dateStr || '—')}
      ${drawerRowHTML('Ville',      evt.city || '—')}
      ${drawerRowHTML('Lieu',       evt.venue || 'À confirmer')}
      ${drawerRowHTML('Édition',    formatEdition(evt.edition_number))}
      ${drawerRowHTML('Plateforme', platformFor(evt))}
      ${drawerRowHTML('Capacité',   formatCapacity(evt.capacity))}
    </div>

    ${raccourcisHTML(evt)}

    <div class="drawer-section">
      <div class="drawer-section-title">Statut</div>
      <select id="drawer-status-select" onchange="handleStatusChange('${evt.name.replace(/'/g, "\\'")}', this.value)"
        style="width:100%;padding:10px 12px;border-radius:7px;border:1px solid var(--border);background:var(--surface-2);color:#fff;font-family:'DM Sans',sans-serif;font-size:.78em;font-weight:500;cursor:pointer">
        ${statusOptionsHTML(evt.status)}
      </select>
    </div>
  `;

  // Footer visible only when an event is selected
  document.getElementById('drawer-footer').style.display = 'flex';

  // Open
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function handleStatusChange(evtName, newStatus) {
  const evt = STAGE2_EVENTS.find(e => e.name === evtName);
  if (!evt) return;
  evt.status = newStatus;
  renderDashboard();
  openEventDrawer(evt);
}

/* ─────────────────────────────────────────────────────────────────────────
 * Stage 5 — filter logic + sort wire against mock-data.
 *
 * FILTERS — locked taxonomy per exec prompt L65-69:
 *   - planned  : status in [PREP,VALIDÉ]    AND !is_sandbox AND !is_general
 *   - selling  : status in [LAUNCHED,LIVE]  AND !is_sandbox AND !is_general
 *   - sandbox  : is_sandbox=true             AND !is_general (orthogonal to status)
 *   - CLOSED events never on Dashboard — Anciens surface, Phase 5.
 *
 * Sort within filter: closest start_date ascending. Null start_date sinks to
 * end (carries from Stage 2/3 sort behavior). Sandbox event with null start_date
 * sorts to end of its filter — only sandbox event V1 mock, so trivially last.
 *
 * Empty-state copy locked per exec prompt L74-77; Leo can override at preview.
 *
 * Filter button click handlers attach in DOMContentLoaded; default state
 * "selling" carries from Stage 2 close (active class on the En vente button).
 * Status changes via drawer re-render Dashboard, which re-filters — event may
 * disappear from view if status change moves it out of current filter (e.g.,
 * LAUNCHED→CLOSED with filter=selling). Drawer stays open in that case (Geo's
 * context survives the filter shift; close manually). V1 behavior, not a bug.
 * ───────────────────────────────────────────────────────────────────────── */

const FILTERS = {
  planned: e => !e.is_sandbox && !e.is_general && ['PREP','VALIDÉ'].includes(e.status),
  selling: e => !e.is_sandbox && !e.is_general && ['LAUNCHED','LIVE'].includes(e.status),
  sandbox: e => !e.is_general && e.is_sandbox
};

const EMPTY_COPY = {
  planned: 'Aucun événement en préparation.',
  selling: 'Aucun événement en vente.',
  sandbox: 'Aucun événement sandbox.'
};

let _currentFilter = 'selling';

function emptyStateHTML(filterName) {
  return `<div style="text-align:center;padding:60px 24px;color:var(--text-dim);font-size:.85em">${EMPTY_COPY[filterName] || ''}</div>`;
}

function setFilter(filterName, btnEl) {
  if (!FILTERS[filterName]) return;
  _currentFilter = filterName;
  document.querySelectorAll('.bilan-toggle-btn').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  renderDashboard();
}

async function renderDashboard() {
  const grid = document.getElementById('dash-grid');
  if (!grid) return;
  const all = await window.MD.getEvents();
  const filterFn = FILTERS[_currentFilter] || (e => !e.is_general);
  const sorted = all
    .filter(filterFn)
    .slice()
    .sort((a, b) => {
      if (!a.start_date && !b.start_date) return 0;
      if (!a.start_date) return 1;
      if (!b.start_date) return -1;
      return a.start_date.localeCompare(b.start_date);
    });

  const caption = document.getElementById('sort-caption');
  if (sorted.length === 0) {
    if (caption) caption.style.display = 'none';
    grid.innerHTML = emptyStateHTML(_currentFilter);
    return;
  }
  if (caption) caption.style.display = '';
  grid.innerHTML = sorted.map((evt, idx) => cardHTML(evt, idx)).join('');
  Array.from(grid.children).forEach((cardEl, idx) => {
    cardEl.addEventListener('click', () => openEventDrawer(sorted[idx]));
  });
}

document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.bilan-toggle-btn').forEach(b => {
    b.addEventListener('click', () => setFilter(b.dataset.filter, b));
  });
  renderDashboard();
});
</script>
</body>
