<!-- ══════════════════════════════════════════════════════════════════════
     Festiflow Module Dates · Liste des événements (Stage 3: row-actions wired)

     STATE (this ship, v5.11.5 / module-internal v0.8.4):
     - Data wiring: static <tr> rows replaced by a JS render off an inline
       STAGE2_EVENTS copy (all 6 rows incl. evt-tc Sandbox) + the
       window.MD.getEvents async wrapper, both verbatim from index.html
       L154-240. KNOWN CONSOLIDATION DEBT: this is a second inline copy of
       the array (index.html holds the first); both collapse into a shared
       extraction at SCHEMA absorption ship #2 under the PARKED Path-C
       re-walk. Logged as a comment in the script header — not acted on.
     - Filters: search box (Nom + Ville, accent/case-insensitive substring),
       single-select status chips (raw 5-value French enum + "Tous"), and
       the "Afficher les sandbox" toggle (default OFF, evt-tc hidden). The
       Sandbox chip is always visible; clicking it auto-enables the toggle.
       Toggling OFF while Sandbox is the active chip snaps the status filter
       back to "Tous". Pipeline: getEvents() → sandbox gate → status filter
       → search → render; empty result renders an empty-state row.
     - Sandbox row marker (brief §4 isolation rule 6): sandbox rows get a
       subtle purple row-tint + a small "sandbox" badge after the name —
       row-level legibility beyond Stage 1's status-dot.
     - Row-actions wired (this stage): edit → fiche.html?id=<evt.id>
       (verbatim with index.html's row-edit route); duplicate → builds a
       copy per the LOCKED field-map (carries producteur/marque/genre[copy]/
       geo/description/copro/template_id; strips dates/edition/prev-id/qonto/
       switcher flags/all 6 URLs; status resets to 'En préparation'),
       unshifted to the TOP of ALL_EVENTS so the new row shows first; soft-
       delete → sets deleted_at, re-renders. A read-filter (e.deleted_at) is
       the FIRST predicate in applyFilters() so deleted rows drop from view.
       A minimal self-contained toast element fires on BOTH duplicate
       ('Copie créée') and delete ('Événement supprimé') — the duplicate
       toast closes the filtered-out-of-view surprise when a status-chip
       filter excludes the reset 'En préparation' copy. Write affordances
       wired UNCONDITIONALLY — role-gating (users.role) deferred to a later
       gating-overlay ship, not built here.
     - Lower-nav (Stage 4 wired): Dashboard → index.html, Admin →
       index.html?tab=admin (Admin panel lives in index.html; the boot
       hook there reads ?tab and opens it via the existing goDeptTab path).
       Liste is the current page — active marker, no handler. Reachability:
       the index.html Liste button now routes here (the #panel-liste stub
       was retired this stage per §02 §13).

     COLUMN SET (V1-locked, dense, bounded by STAGE2_EVENTS shape):
       Nom · Statut · Marque · Producteur · Ville · Date début · Jauge ·
       Budget % · Intégrations (BF/Bil dual-cell) · row-actions trailing.

     SCHEMA cascades surfaced this build (input to absorption ship #2):
     - mock STAGE2_EVENTS carries scalar `capacity`; SCHEMA expects
       SUM across `event_days` rows. Liste Stage 1 reads the scalar
       directly in hardcoded markup; Stage 2 wires window.MD.getEvents
       which can compute SUM when the mock extends to event_days.
     - country / address / coproducer / external_coproduction missing
       from STAGE2_EVENTS — Liste columns bounded by mock presence, not
       Fiche/SCHEMA field set. Those fields stay column-candidates
       blocked on mock-shape extension at SCHEMA ship #2.

     Zero ADRs this ship — Liste is execution of briefs/evenements.md §3
     V1 surface intent + HANDOFF §5 explicit liste.html naming + ADR-0011
     chrome canonical consumption. Sufficient pre-existing authority per
     playbook §10 §3 significance test.
     ══════════════════════════════════════════════════════════════════════ -->

.row-action:first-child{margin-left:0}
.row-action:not([disabled]){cursor:pointer;opacity:1}

/* ═══ TOAST (Stage 3) ═══ */
#liste-toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;box-shadow:0 6px 24px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .2s;z-index:50}

/* ═══ SANDBOX ROW MARKER (brief §4 isolation rule 6) ═══ */

<script>
/* ═══════════════════════════════════════════════════════════════════════
   Liste Stage 2 — data wiring + filters.

   Data source: inline STAGE2_EVENTS copy + window.MD.getEvents wrapper,
   verbatim from index.html L154-240 per Stage-2 inline-copy decision.
   KNOWN CONSOLIDATION DEBT: this is a second inline copy of the array
   (index.html holds the first). Both collapse into a shared extraction
   at SCHEMA absorption ship #2 under the Path-C re-walk — see PARKED
   "window.MD vocab-layer consolidation scope (Path C)". Do NOT extract
   here; that reaches into deliberately-parked scope.

   Filter pipeline: getEvents() -> sandbox gate (drop Sandbox unless
   toggle on) -> status filter (Tous = all eligible; else exact match)
   -> search (Nom + Ville substring, accent/case-insensitive) -> render.
   ═══════════════════════════════════════════════════════════════════════ */

const STAGE2_EVENTS = [
  { id:'evt-sb', qonto_account_id:'qa-bdx', in_switcher:true, name:'Madame Loyal x Sonora Bordeaux',  status:'En vente', is_general:false,

    budget_target:950000, budget_consumed:385000, edition_number:4, capacity:44500,

    budgetflow_url:'https://festiflow.studioai2k.com/budget/bdx',
    billetterie_url:'https://festiflow.studioai2k.com/billetterie/bordeaux' },
  { id:'evt-cc', qonto_account_id:'qa-mic', in_switcher:false, name:'Madame Loyal x Crazy Carnaval',   status:'En vente', is_general:false,
    city:'Paris',    venue:'Cirque Micheletty',        start_date:'2026-07-04', number_of_days:1, poster_url:null, display_initials:'CC', producteur:'EPISODE', marque:'Madame Loyal',
    budget_target:380000, budget_consumed:115000, edition_number:1, capacity:3800,
    description:null, genre:[], previous_edition_event_id:null, template_id:null,
    dice_backend_url:'https://dice.fm/event/crazy-carnaval-2026', shotgun_backend_url:null,
    dice_public_buy_url:null, shotgun_public_buy_url:null,
    budgetflow_url:null, billetterie_url:null },
  { id:'evt-ep', qonto_account_id:'qa-epk', in_switcher:true, name:'Madame Loyal x Elektric Park',    status:'En vente', is_general:false,
    city:'Chatou',   venue:'Ile des Impressionnistes', start_date:'2026-09-05', number_of_days:1, poster_url:null, display_initials:'EP', producteur:'EPISODE', marque:'Madame Loyal',

    description:null, genre:['Électro'], previous_edition_event_id:null, template_id:null,
    dice_backend_url:'https://dice.fm/event/elektric-park-2026', shotgun_backend_url:null,
    dice_public_buy_url:'https://dice.fm/partner/tickets/event/oepro5',
    shotgun_public_buy_url:null,
    budgetflow_url:'https://festiflow.studioai2k.com/budget/epk',
    billetterie_url:'https://festiflow.studioai2k.com/billetterie/epk' },
  { id:'evt-si', qonto_account_id:null, in_switcher:false, name:'SONORA x IMPACT',                 status:'En vente', is_general:false,
    city:'Paris',    venue:'Parc des Expositions de Villepinte', start_date:'2026-09-25', number_of_days:1, poster_url:null, display_initials:'SI', producteur:'EPISODE', marque:'Sonora',

window.MD = window.MD || {};
window.MD.getEvents = async function() {
  return STAGE2_EVENTS;
};

/* ── filter state ── */
const FILTER = { search:'', status:'all', showSandbox:false };

/* ── helpers ── */
const STATUS_DOT = {
  'En préparation':'s-prep', 'En vente':'s-vente', 'Annulé':'s-annule',
  'Sandbox':'s-sandbox', 'Terminé':'s-termine'
};
function norm(s){ return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function fmtDate(iso){
  if(!iso) return '—';
  return new Date(iso+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
}
function fmtJauge(n){ return n==null ? '—' : n.toLocaleString('fr-FR'); }
function budgetPct(evt){
  if(evt.budget_target==null||evt.budget_consumed==null) return null;
  return Math.round(evt.budget_consumed/evt.budget_target*100);
}
function fmtTarget(n){ return n==null ? '' : Math.round(n/1000).toLocaleString('fr-FR')+' k€'; }
function integMark(label,on){
  return '<span class="integ-mark '+(on?'on':'off')+'">'+label+'</span>';
}
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── filter pipeline ── */
function applyFilters(events){
  return events.filter(function(e){
    if(e.deleted_at) return false;                                       // soft-delete read-filter (first predicate)
    if(e.status==='Sandbox' && !FILTER.showSandbox) return false;        // sandbox gate
    if(FILTER.status!=='all' && e.status!==FILTER.status) return false;  // status filter
    if(FILTER.search){                                                    // search Nom + Ville
      const q = norm(FILTER.search);
      if(norm(e.name).indexOf(q)===-1 && norm(e.city).indexOf(q)===-1) return false;
    }
    return true;
  });
}

/* ── row render ── */
function rowHTML(evt){
  const isSb = evt.status==='Sandbox';
  const pct = budgetPct(evt);
  const sbBadge = isSb ? '<span class="sandbox-badge">sandbox</span>' : '';
  const budgetCell = pct==null
    ? '<span class="col-budget-pct">—</span>'
    : '<div class="col-budget"><span class="col-budget-pct">'+pct+'%</span><span class="col-budget-target">'+fmtTarget(evt.budget_target)+'</span></div>';
  return ''+
    '<tr'+(isSb?' class="is-sandbox-row"':'')+'>'+
      '<td class="col-nom">'+esc(evt.name)+sbBadge+'</td>'+
      '<td><span class="lstatus"><span class="lstatus-dot '+STATUS_DOT[evt.status]+'"></span>'+esc(evt.status)+'</span></td>'+
      '<td>'+esc(evt.marque||'—')+'</td>'+
      '<td>'+esc(evt.producteur||'—')+'</td>'+
      '<td>'+esc(evt.city||'—')+'</td>'+
      '<td>'+fmtDate(evt.start_date)+'</td>'+
      '<td class="num">'+fmtJauge(evt.capacity)+'</td>'+
      '<td>'+budgetCell+'</td>'+
      '<td><span class="integ-pair">'+integMark('BF',!!evt.budgetflow_url)+integMark('Bil',!!evt.billetterie_url)+'</span></td>'+
      '<td class="col-actions">'+
        '<button class="row-action" data-act="edit" data-id="'+esc(evt.id)+'" title="Modifier" aria-label="Modifier">✎</button>'+
        '<button class="row-action" data-act="dup" data-id="'+esc(evt.id)+'" title="Dupliquer" aria-label="Dupliquer">⧉</button>'+
        '<button class="row-action" data-act="del" data-id="'+esc(evt.id)+'" title="Supprimer" aria-label="Supprimer">🗑</button>'+
      '</td>'+
    '</tr>';
}

/* ── render ── */
let ALL_EVENTS = [];
function renderRows(){
  const rows = applyFilters(ALL_EVENTS);
  const tbody = document.getElementById('liste-tbody');
  if(rows.length===0){
    tbody.innerHTML = '<tr class="liste-empty"><td colspan="10">Aucun événement ne correspond.</td></tr>';
  } else {
    tbody.innerHTML = rows.map(rowHTML).join('');
  }
  injectChipCounts(ALL_EVENTS);
}

/* ── compute-and-inject chip counts (Ship 2.5; Ship 3a reuses this pattern) ──
   Counts are STATIC per data state: computed ONCE per render off the same
   events array the table reads (ALL_EVENTS), NOT off the active-chip filter —
   switching the active chip never changes the numbers, only a data change
   (duplicate / soft-delete) does. Each chip shows `Label (N)`; Tous = all
   non-deleted events (liste's data is all non-general, so Tous = total),
   each status chip = events with that status. Injection preserves each chip's
   data-status attr + its .on class by writing only the text node. */
function injectChipCounts(events){
  const live = events.filter(function(e){ return !e.deleted_at; });
  document.querySelectorAll('#liste-status-chips .lchip').forEach(function(chip){
    const s = chip.getAttribute('data-status');
    const label = chip.getAttribute('data-label') || (chip.setAttribute('data-label', chip.textContent.trim()), chip.getAttribute('data-label'));
    const n = (s==='all') ? live.length : live.filter(function(e){ return e.status===s; }).length;
    chip.textContent = label + ' (' + n + ')';
  });
}

/* ── row actions (Stage 3) ── */
let toastTimer = null;
function showToast(msg){
  let t = document.getElementById('liste-toast');
  if(!t){ t = document.createElement('div'); t.id = 'liste-toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1800);
}
function actEdit(id){
  window.location.href = 'fiche.html?id=' + encodeURIComponent(id);
}
function actDuplicate(id){
  const src = ALL_EVENTS.find(function(e){ return e.id===id; });
  if(!src) return;
  const copy = {
    id:'evt-copy-' + Date.now(),
    name:'Copie_' + src.name,
    status:'En préparation',
    // CARRIES
    producteur:src.producteur, marque:src.marque, genre:src.genre.slice(),
    city:src.city, venue:src.venue, country:src.country, address:src.address,
    description:src.description, coproducer_id:src.coproducer_id,
    external_coproduction:src.external_coproduction,
    template_id:src.template_id,                  // inert ref — BudgetFlow owns session generation V1
    // STRIPS / RESETS
    start_date:null, number_of_days:null, previous_edition_event_id:null,
    edition_number:null, qonto_account_id:null, in_switcher:false,
    is_general:false, deleted_at:null,
    budgetflow_url:null, billetterie_url:null, dice_backend_url:null,
    shotgun_backend_url:null, dice_public_buy_url:null, shotgun_public_buy_url:null,
    // render-safe null defaults (display/budget fields not in spec map)
    display_initials:null, poster_url:null, budget_target:null,
    budget_consumed:null, capacity:null
  };
  ALL_EVENTS.unshift(copy);
  renderRows();
  showToast('Copie créée');
}
function actDelete(id){
  const evt = ALL_EVENTS.find(function(e){ return e.id===id; });
  if(!evt) return;
  evt.deleted_at = new Date().toISOString();
  renderRows();
  showToast('Événement supprimé');
}

/* ── wire controls ── */
function wireControls(){
  document.getElementById('liste-tbody').addEventListener('click', function(e){
    const btn = e.target.closest('.row-action'); if(!btn) return;
    const act = btn.getAttribute('data-act');
    const id = btn.getAttribute('data-id');
    if(act==='edit') actEdit(id);
    else if(act==='dup') actDuplicate(id);
    else if(act==='del') actDelete(id);
  });
  document.getElementById('liste-search-input').addEventListener('input', function(e){
    FILTER.search = e.target.value; renderRows();
  });
  document.getElementById('liste-status-chips').addEventListener('click', function(e){
    const btn = e.target.closest('.lchip'); if(!btn) return;
    const status = btn.getAttribute('data-status');
    FILTER.status = status;
    document.querySelectorAll('#liste-status-chips .lchip').forEach(function(c){ c.classList.remove('on'); });
    btn.classList.add('on');
    if(status==='Sandbox' && !FILTER.showSandbox){           // selecting Sandbox auto-enables toggle
      FILTER.showSandbox = true;
      document.getElementById('liste-sandbox-toggle').checked = true;
    }
    renderRows();
  });
  document.getElementById('liste-sandbox-toggle').addEventListener('change', function(e){
    FILTER.showSandbox = e.target.checked;
    if(!FILTER.showSandbox && FILTER.status==='Sandbox'){    // toggle off while Sandbox active → snap to Tous
      FILTER.status = 'all';
      document.querySelectorAll('#liste-status-chips .lchip').forEach(function(c){ c.classList.remove('on'); });
      document.querySelector('#liste-status-chips .lchip[data-status="all"]').classList.add('on');
    }
    renderRows();
  });
}

/* ── boot ── */
window.MD.getEvents().then(function(events){
  ALL_EVENTS = events;
  wireControls();
  renderRows();
});
</script>
