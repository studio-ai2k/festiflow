name: Fetch Billetterie Data

# Live billetterie pipeline: runs the validated data layer (billetterie/run.py),
# reconciles the DICE settlement gate, and commits the JSON contract the drawer +
# recette consume. Secrets injected at runtime from GitHub Actions secrets.

on:
  # Automatic fetching is DISABLED — no scheduled runs hit DICE/Shotgun.
  # Manual-only: trigger from the Actions tab if/when a pull is explicitly wanted.
  workflow_dispatch:
    inputs:
      mode:
        description: 'recon (probe schema, no write) or fetch (full pull + gate + commit)'
        type: choice
        options: [fetch, recon]
        default: fetch
      event:
        description: 'Event id from event_config.csv'
        required: false
        default: 'bordeaux_2026'

permissions:
  contents: write

concurrency:
  group: fetch-billetterie
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run billetterie pipeline
        env:
          SHOTGUN_TOKEN: ${{ secrets.SHOTGUN_TOKEN }}
          SHOTGUN_ORGANIZER_ID: ${{ secrets.SHOTGUN_ORGANIZER_ID }}
          SHOTGUN_TOKEN2: ${{ secrets.SHOTGUN_TOKEN2 }}
          SHOTGUN_ORGANIZER2_ID: ${{ secrets.SHOTGUN_ORGANIZER2_ID }}
          DICE_TOKEN: ${{ secrets.DICE_TOKEN }}
        run: |
          set -euo pipefail
          cd billetterie
          MODE="${{ github.event.inputs.mode }}"; MODE="${MODE:-fetch}"
          EVENT="${{ github.event.inputs.event }}"; EVENT="${EVENT:-bordeaux_2026}"
          echo "mode=$MODE event=$EVENT"
          python run.py --mode "$MODE" --event "$EVENT"

      - name: Commit & push JSON
        # Only on a successful fetch (gate green -> run.py exits 0). recon writes nothing.
        if: success() && (github.event.inputs.mode == 'fetch' || github.event_name == 'schedule')
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add billetterie/output/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: refresh billetterie contract [skip ci]"
            git push
          fi
